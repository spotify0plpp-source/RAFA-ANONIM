<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPX - ALYAAA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; min-height: 100vh; }
        
        .main-bg {
            background: linear-gradient(rgba(165, 243, 252, 0.7), rgba(251, 207, 232, 0.7)), 
                        url('https://i.ibb.co.com/1GpkM7br/1741165509923.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh;
        }

        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .btn-base { font-weight: 800; border-radius: 20px; padding: 16px; width: 100%; border: none; cursor: pointer; transition: all 0.2s ease-in-out; text-transform: uppercase; tracking-widest; font-size: 12px; outline: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: #fff; color: #be185d; }
        .btn-main:active { transform: translateY(1px) scale(0.98); }
        
        .btn-vip { background: linear-gradient(45deg, #ec4899, #db2777); color: #fff; box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4); }
        .btn-vip:active { transform: translateY(1px) scale(0.98); opacity: 0.9; }

        .input-rap { background: rgba(255, 255, 255, 0.9); border-radius: 18px; padding: 18px; width: 100%; border: 1px solid rgba(0,0,0,0.05); color: #000; font-weight: 600; outline: none; }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-ui { animation: fadeInSlide 0.4s ease-out forwards; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }
        .anim-loading { animation: pulse-soft 1.2s infinite; }
    </style>
</head>
<body class="main-bg flex flex-col items-center p-6">
    
    <div id="loading-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50 transition-opacity duration-500">
        <div class="text-7xl font-black italic text-pink-500 anim-loading">R.</div>
        <p class="text-white/50 mt-4 font-bold text-[10px] tracking-[0.3em] uppercase">Initializing RAPX</p>
    </div>

    <div id="app-container" class="w-full max-w-sm opacity-0 transition-opacity duration-500"></div>

    <script>
        // --- DATA KONFIGURASI ---
        const NO_WA_DEV = "6285779155783"; 
        const firebaseConfig = {
            apiKey: "AIzaSyCrV-VoZ00xAAlNkEyfz3fB3O323jJuSXE",
            databaseURL: "https://rapx-ngl-default-rtdb.firebaseio.com",
            projectId: "rapx-ngl"
        };
        // ------------------------

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('app-container');
        const loader = document.getElementById('loading-screen');

        const params = new URLSearchParams(window.location.search);
        const target = params.get('u');

        // JALANKAN SISTEM SETELAH LOAD
        window.onload = () => {
            if (target) {
                renderSender(target);
            } else {
                checkSession();
            }
        };

        function showUI() {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                container.style.opacity = '1';
            }, 300);
        }

        function checkSession() {
            const session = localStorage.getItem('rapx_user');
            if (!session) {
                renderLanding();
                showUI();
            } else {
                try {
                    const localUser = JSON.parse(session);
                    const uid = localUser.user || localUser.username;
                    
                    // Cek validasi akun ke DB (Sekali saja)
                    db.ref('users/' + uid).once('value').then(snap => {
                        const dbData = snap.val();
                        if (dbData) {
                            localStorage.setItem('rapx_user', JSON.stringify(dbData));
                            renderDashboard(dbData);
                        } else {
                            renderLanding();
                        }
                        showUI();
                    }).catch(() => {
                        // Jika koneksi bapuk, tetep masukin ke dashboard pake data lokal
                        renderDashboard(localUser);
                        showUI();
                    });
                } catch (e) {
                    localStorage.clear();
                    renderLanding();
                    showUI();
                }
            }
        }

        function renderLanding() {
            container.innerHTML = `
                <div class="text-center space-y-10 mt-16 animate-ui">
                    <h1 class="text-8xl font-black italic drop-shadow-2xl tracking-tighter">RAPX.</h1>
                    <div class="glass p-8 space-y-5">
                        <input id="l_u" placeholder="Username" class="input-rap">
                        <input id="l_p" type="password" placeholder="Password" class="input-rap">
                        <button onclick="doLogin()" class="btn-base btn-main shadow-lg">MASUK SISTEM</button>
                    </div>
                    <p onclick="renderRegister()" class="text-sm font-bold underline cursor-pointer opacity-70">Belum punya akun? Daftar</p>
                </div>`;
        }

        function doLogin() {
            const u = document.getElementById('l_u').value.trim().toLowerCase();
            const p = document.getElementById('l_p').value;
            if (!u || !p) return alert("Lengkapi data!");

            // LOGIN DEVELOPER RAFA
            if (u === "rapx" && p === "rapx") {
                localStorage.setItem('rapx_user', JSON.stringify({ user: "Rafa Fauzan Kamil", level: "DEV" }));
                return location.href = window.location.pathname;
            }

            db.ref('users/' + u).once('value').then(snap => {
                const val = snap.val();
                if (val && val.pass === p) {
                    localStorage.setItem('rapx_user', JSON.stringify(val));
                    location.href = window.location.pathname;
                } else {
                    alert("Akun tidak ditemukan atau Password salah!");
                }
            });
        }

        function renderDashboard(data) {
            const name = data.user || "User";
            const level = data.level || "USER";
            const link = window.location.origin + window.location.pathname + "?u=" + name;

            container.innerHTML = `
                <div class="glass p-8 text-center space-y-7 mt-12 shadow-2xl animate-ui">
                    <div class="flex flex-col items-center">
                        <div class="w-24 h-24 bg-gradient-to-br from-pink-400 to-pink-600 rounded-full flex items-center justify-center text-5xl font-black text-white border-4 border-white shadow-lg">
                            ${name.charAt(0).toUpperCase()}
                        </div>
                        <div class="mt-5">
                            <h2 class="text-3xl font-black text-slate-800 italic tracking-tight">${name}</h2>
                            <div class="flex gap-2 justify-center items-center mt-2">
                                <span class="bg-black text-white text-[10px] px-4 py-1 rounded-full font-black uppercase tracking-widest">${level}</span>
                                ${level !== 'DEV' ? `<span onclick="buyVIP('${name}')" class="bg-amber-400 text-amber-900 text-[10px] px-3 py-1 rounded-full font-black cursor-pointer">UPGRADE?</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <button onclick="copy('${link}')" class="btn-base btn-main text-xs shadow-sm">🔗 SALIN LINK BIO</button>
                        ${level !== 'DEV' ? `<button onclick="buyVIP('${name}')" class="btn-base btn-vip text-xs">👑 BELI AKSES VIP</button>` : ''}
                    </div>
                    <p onclick="logout()" class="text-[11px] text-slate-500 font-bold underline cursor-pointer hover:text-red-500 transition">LOGOUT / KELUAR</p>
                </div>
                <div class="mt-10 mb-4 px-2 flex justify-between items-center">
                    <h3 class="text-xl font-black italic text-white uppercase">Inbox</h3>
                    <span id="count" class="text-xs font-bold text-white/50">Memuat...</span>
                </div>
                <div id="msg-list" class="space-y-5 pb-24"></div>`;
            
            loadInbox(name);
        }

        function loadInbox(u) {
            db.ref('messages/' + u).on('value', snap => {
                const box = document.getElementById('msg-list');
                const count = document.getElementById('count');
                if (!box) return;
                box.innerHTML = "";
                
                if (!snap.exists()) {
                    count.innerText = "0 Pesan";
                    box.innerHTML = `<div class="glass p-10 text-center opacity-60 font-bold mt-5 text-slate-700">Tidak ada pesan anonim.</div>`;
                    return;
                }

                let msgs = [];
                snap.forEach(m => msgs.push(m.val()));
                msgs.sort((a,b) => b.time - a.time);
                count.innerText = msgs.length + " Pesan";

                msgs.forEach((d, i) => {
                    const item = document.createElement('div');
                    item.className = "glass p-6 shadow-lg border-l-4 border-pink-500 animate-ui";
                    item.style.animationDelay = (i * 100) + 'ms';
                    item.innerHTML = `<p class="text-slate-800 font-bold text-lg leading-snug">"${d.text || ''}"</p>
                                      <div class="mt-4 text-[9px] text-slate-400 font-black flex justify-between">
                                        <span>ANONIM</span>
                                        <span>${new Date(d.time).toLocaleTimeString()}</span>
                                      </div>`;
                    box.appendChild(item);
                });
            });
        }

        function renderSender(uid) {
            container.innerHTML = `
                <div class="text-center space-y-7 mt-16 animate-ui">
                    <div class="glass p-4 inline-block px-10 shadow-xl border-2 border-white">
                        <h1 class="text-3xl font-black italic uppercase text-slate-800">@${uid}</h1>
                    </div>
                    <textarea id="m_input" placeholder="Tulis pesan rahasia yang jujur..." class="w-full h-64 glass p-8 text-slate-800 font-bold text-lg outline-none border-none shadow-2xl focus:ring-4 ring-pink-300"></textarea>
                    <button onclick="sendMsg('${uid}')" class="btn-base btn-main shadow-lg text-sm">KIRIM ANONIM</button>
                    <p class="text-[10px] text-white/80 font-bold uppercase tracking-widest">Identitasmu dirahasiakan sistem</p>
                </div>`;
            showUI();
        }

        function sendMsg(uid) {
            const el = document.getElementById('m_input');
            const txt = el.value.trim();
            if (!txt) return alert("Pesan tidak boleh kosong!");
            
            db.ref('messages/' + uid).push({ text: txt, time: Date.now() })
                .then(() => { 
                    alert("Berhasil Terkirim!"); 
                    el.value = ""; 
                }).catch(() => alert("Gagal Kirim!"));
        }

        function renderRegister() {
            container.innerHTML = `
                <div class="text-center space-y-10 mt-16 animate-ui">
                    <h1 class="text-6xl font-black italic uppercase text-white">Join.</h1>
                    <div class="glass p-8 space-y-5">
                        <input id="r_u" placeholder="Username" class="input-rap">
                        <input id="r_p" type="password" placeholder="Password" class="input-rap">
                        <button onclick="doReg()" class="btn-base btn-main shadow-lg">BUAT AKUN</button>
                    </div>
                    <p onclick="location.reload()" class="text-sm font-bold underline cursor-pointer">Kembali ke Login</p>
                </div>`;
        }

        function doReg() {
            const u = document.getElementById('r_u').value.toLowerCase().trim();
            const p = document.getElementById('r_p').value;
            if (u.length < 3 || p.length < 4) return alert("Username min 3 huruf, Pass min 4!");

            db.ref('users/' + u).once('value').then(snap => {
                if(snap.exists()) return alert("Username sudah dipakai!");
                db.ref('users/' + u).set({ user: u, pass: p, level: 'USER' })
                    .then(() => { alert("Sukses! Silahkan Login."); location.reload(); });
            });
        }

        function buyVIP(u) {
            const txt = `Halo Dev RAPX, gw mau beli akses VIP buat Username: ${u.toUpperCase()}`;
            window.open(`https://wa.me/${NO_WA_DEV}?text=${encodeURIComponent(txt)}`, '_blank');
        }

        function copy(t) {
            navigator.clipboard.writeText(t).then(() => alert("Link Berhasil Disalin!"));
        }

        function logout() {
            if(confirm("Yakin mau Logout?")) {
                localStorage.clear();
                location.href = window.location.pathname;
            }
        }
    </script>
</body>
</html>
