<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPX - ALYAAA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #000; min-height: 100vh; margin: 0; }
        .main-bg {
            background: linear-gradient(rgba(165, 243, 252, 0.7), rgba(251, 207, 232, 0.7)), 
                        url('https://i.ibb.co.com/1GpkM7br/1741165509923.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .glass { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 40px; }
        .btn-main { background: #ffffff; color: #be185d; font-weight: 900; border-radius: 30px; padding: 18px; width: 100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(190, 24, 93, 0.1); }
        .badge-pacar { background: #f472b6; color: #fff; font-size: 10px; font-weight: 900; padding: 6px 16px; border-radius: 12px; animation: pulse 2s infinite; }
        .badge-vvip { background: #8b5cf6; color: #fff; font-size: 8px; font-weight: 900; padding: 4px 12px; border-radius: 10px; }
        .badge-vip { background: #0ea5e9; color: #fff; font-size: 8px; font-weight: 900; padding: 4px 12px; border-radius: 10px; }
        .input-rap { background: rgba(255, 255, 255, 0.6); border: 1px solid white; border-radius: 20px; padding: 18px; width: 100%; outline: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="main-bg flex flex-col items-center p-6">
    <div id="app-container" class="w-full max-w-sm pt-8"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrV-VoZ00xAAlNkEyfz3fB3O323jJuSXE",
            databaseURL: "https://rapx-ngl-default-rtdb.firebaseio.com",
            projectId: "rapx-ngl"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('rapx_user'));
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('u');

        if (target) { renderSender(target); } 
        else if (currentUser) { startApp(); } 
        else { renderLanding(); }

        function renderLanding() {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-8 py-10">
                    <h1 class="text-7xl font-black italic text-white tracking-tighter drop-shadow-lg">RAPX.</h1>
                    <div class="glass p-8 space-y-4">
                        <input id="l_user" placeholder="Username" class="input-rap">
                        <input id="l_pass" type="password" placeholder="Password" class="input-rap">
                        <button onclick="login()" class="btn-main uppercase tracking-widest">Login</button>
                    </div>
                    <p class="text-[10px] font-bold text-white uppercase tracking-tighter">V21 Supreme • <span onclick="renderRegister()" class="underline cursor-pointer">Daftar</span></p>
                </div>`;
        }

        function login() {
            const u = document.getElementById('l_user').value.trim();
            const p = document.getElementById('l_pass').value;
            if (u === "rapx" && p === "rapx") {
                const devData = { user: "rapx", pass: "rapx", level: "DEV", foto: "" };
                localStorage.setItem('rapx_user', JSON.stringify(devData));
                location.reload(); return;
            }
            db.ref('users/' + u.toLowerCase()).once('value', snap => {
                if(snap.exists() && snap.val().pass === p) {
                    localStorage.setItem('rapx_user', JSON.stringify(snap.val()));
                    location.reload();
                } else { alert("Login Gagal!"); }
            });
        }

        function register() {
            const u = document.getElementById('r_user').value.toLowerCase().trim();
            const p = document.getElementById('r_pass').value;
            if(!u || !p) return alert("Isi data!");
            db.ref('users/' + u).set({ 
                user: u, pass: p, level: 'USER', 
                foto: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' 
            }).then(() => { location.reload(); });
        }

        function renderRegister() {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-8 py-10">
                    <h1 class="text-6xl font-black italic text-white tracking-tighter uppercase">Join.</h1>
                    <div class="glass p-8 space-y-4">
                        <input id="r_user" placeholder="Username" class="input-rap">
                        <input id="r_pass" type="password" placeholder="Password" class="input-rap">
                        <button onclick="register()" class="btn-main">BUAT AKUN</button>
                    </div>
                    <p onclick="location.reload()" class="text-xs text-white underline cursor-pointer">Back</p>
                </div>`;
        }

        function startApp() {
            db.ref('users/' + currentUser.user).on('value', snap => {
                const data = snap.val() || currentUser;
                renderDashboard(data);
            });
        }

        function renderDashboard(data) {
            const link = window.location.origin + window.location.pathname + "?u=" + data.user;
            const userFoto = data.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            const hasControl = (data.level === 'DEV' || data.level === 'MY PACAR');
            
            document.getElementById('app-container').innerHTML = `
                <div class="glass p-8 text-center space-y-5 relative">
                    <div class="flex flex-col items-center">
                        <div class="relative">
                            <img src="${userFoto}" class="w-24 h-24 rounded-full border-4 border-white shadow-xl object-cover mb-2">
                            <button onclick="changeAvatar()" class="absolute bottom-2 right-0 bg-white p-2 rounded-full shadow-lg text-[10px] border">📸</button>
                        </div>
                        <h2 class="text-3xl font-black italic text-slate-800">${data.user}</h2>
                        <div class="mt-2 flex flex-wrap justify-center gap-2">
                            ${data.level === 'MY PACAR' ? '<span class="badge-pacar">MY PACAR 🤍</span>' : ''}
                            ${data.level === 'DEV' ? '<span class="bg-black text-white text-[8px] px-3 py-1 rounded font-bold uppercase tracking-widest shadow-md">SUPREME DEV</span>' : ''}
                            ${data.level === 'VVIP' ? '<span class="badge-vvip">VVIP MEMBER</span>' : ''}
                            ${data.level === 'VIP' ? '<span class="badge-vip">VIP MEMBER</span>' : ''}
                        </div>
                    </div>
                    <button onclick="navigator.clipboard.writeText('${link}'); alert('Link Disalin!')" class="btn-main text-[10px] uppercase tracking-widest shadow-lg">Salin Link Bio</button>
                    ${hasControl ? `<button onclick="renderAdmin()" class="w-full bg-pink-600 text-white py-3 rounded-2xl font-black text-[10px] shadow-lg uppercase tracking-widest">Admin Control</button>` : ''}
                    <p onclick="localStorage.clear(); location.reload()" class="text-[9px] font-bold text-slate-500 cursor-pointer uppercase tracking-widest">Logout</p>
                </div>
                <div id="msgs-box" class="mt-8 space-y-4 pb-20"></div>`;
            loadMessages(data.user, data.level);
        }

        function changeAvatar() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file'; fileInput.accept = 'image/*';
            fileInput.onchange = e => {
                const file = e.target.files[0];
                if (file.size > 300000) return alert("Kegedean!");
                const reader = new FileReader();
                reader.onload = function(event) {
                    db.ref('users/' + currentUser.user).update({ foto: event.target.result });
                    alert("Berhasil!");
                };
                reader.readAsDataURL(file);
            };
            fileInput.click();
        }

        function loadMessages(username, level) {
            db.ref('messages/' + username).on('value', snap => {
                const box = document.getElementById('msgs-box'); box.innerHTML = "";
                const canSee = (level !== 'USER');
                snap.forEach(m => {
                    const msg = m.val();
                    box.innerHTML = `
                        <div class="glass p-5 rounded-[30px] border border-white/40 shadow-sm">
                            <p class="text-md font-bold italic text-slate-800">"${msg.text}"</p>
                            <p class="mt-3 text-[9px] font-black text-pink-600 uppercase">
                                ${canSee ? 'DARI: '+msg.sender : 'HINT: '+ (msg.hint || 'Anonim')}
                            </p>
                        </div>` + box.innerHTML;
                });
            });
        }

        function renderSender(uid) {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-6 pt-10">
                    <h1 class="text-5xl font-black italic text-white drop-shadow-md uppercase tracking-tighter">${uid}</h1>
                    <textarea id="m_txt" placeholder="Kirim pesan rahasia..." class="w-full h-60 glass p-8 text-lg font-bold outline-none text-slate-800 placeholder-slate-500"></textarea>
                    <button onclick="sendMsg('${uid}')" class="btn-main shadow-2xl uppercase tracking-widest">Kirim Anonim</button>
                    <p onclick="location.href=location.origin+location.pathname" class="text-xs text-white underline cursor-pointer">Buat Akun RAPX</p>
                </div>`;
        }

        function sendMsg(uid) {
            const txt = document.getElementById('m_txt').value;
            if(!txt) return alert("Isi pesan!");
            db.ref('messages/' + uid).push({ text: txt, sender: (currentUser ? currentUser.user : "Anonim"), hint: navigator.platform });
            alert("Terkirim!"); document.getElementById('m_txt').value = "";
        }

        function renderAdmin() {
            document.getElementById('app-container').innerHTML = `<div class="glass p-8"><h1 class="text-xl font-black mb-6 text-slate-800 uppercase italic text-center">Admin</h1><div id="u_list" class="space-y-4"></div><button onclick="location.reload()" class="mt-8 text-xs font-bold underline">BACK</button></div>`;
            db.ref('users').once('value', snap => {
                const box = document.getElementById('u_list');
                const adminLevel = currentUser.level || 'USER';
                snap.forEach(u => {
                    if(u.key === "rapx") return; // Gak bisa hapus owner
                    box.innerHTML += `<div class="flex justify-between items-center border-b border-white/50 pb-3">
                        <div><p class="font-bold text-sm text-slate-800">${u.key}</p><p class="text-[7px] uppercase font-black text-pink-600">${u.val().level}</p></div>
                        <div class="flex gap-1">
                            <button onclick="updateLvl('${u.key}', 'VIP')" class="bg-blue-400 text-white text-[7px] px-2 py-1 rounded">VIP</button>
                            <button onclick="updateLvl('${u.key}', 'VVIP')" class="bg-purple-500 text-white text-[7px] px-2 py-1 rounded">VVIP</button>
                            <button onclick="updateLvl('${u.key}', 'MY PACAR')" class="bg-pink-500 text-white text-[7px] px-2 py-1 rounded">PACAR</button>
                            <button onclick="delUser('${u.key}')" class="bg-red-600 text-white text-[7px] px-2 py-1 rounded font-bold">HAPUS</button>
                        </div>
                    </div>`;
                });
            });
        }
        function updateLvl(u, l) { db.ref('users/'+u).update({level:l}); alert("Updated!"); renderAdmin(); }
        function delUser(u) { if(confirm('Yakin hapus '+u+'?')) { db.ref('users/'+u).remove(); db.ref('messages/'+u).remove(); alert('Terhapus!'); renderAdmin(); } }
    </script>
</body>
</html>
