<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPX NGL - FINAL BYPASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #000; color: #fff; }
        .ngl-gradient { background: linear-gradient(45deg, #FF0055, #FFCC00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div id="app-container" class="w-full max-w-sm space-y-8 mt-10">
        <div class="text-center space-y-8 py-10">
            <h1 class="text-7xl font-black italic ngl-gradient tracking-tighter">RAPX.</h1>
            <p class="text-zinc-500 animate-pulse text-[10px] tracking-widest uppercase font-bold">Menghubungkan Server...</p>
        </div>
    </div>

    <script>
        // --- DATA FIREBASE BOSS RAFA ---
        const firebaseConfig = {
            apiKey: "AIzaSyCrV-VoZ00xAAlNkEyfz3fB3O323jJuSXE",
            authDomain: "rapx-ngl.firebaseapp.com",
            databaseURL: "https://rapx-ngl-default-rtdb.firebaseio.com",
            projectId: "rapx-ngl",
            storageBucket: "rapx-ngl.firebasestorage.app",
            messagingSenderId: "689640403951",
            appId: "1:689640403951:web:ecb7bb44bed45d437b7c1a"
        };

        // Inisialisasi
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('u');

        // Logic Bypass Tampilan
        if (target) {
            renderSender(target);
        } else {
            auth.onAuthStateChanged(user => {
                if (user) {
                    checkUser(user);
                } else {
                    renderLanding();
                }
            });
        }

        function renderLanding() {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-8 py-10">
                    <h1 class="text-7xl font-black italic ngl-gradient tracking-tighter">RAPX.</h1>
                    <button onclick="auth.signInWithPopup(provider)" class="w-full bg-white text-black p-5 rounded-full font-black flex items-center justify-center gap-3 shadow-xl active:scale-95 transition">
                        SIGN IN WITH GOOGLE
                    </button>
                    <p class="text-[9px] text-zinc-900 font-bold uppercase tracking-widest pt-10">Owner TikTok: @rapaa_71</p>
                </div>
            `;
        }

        function renderSender(uid) {
            db.ref('users/' + uid).once('value', snap => {
                const name = snap.exists() ? snap.val().handle : "User";
                document.getElementById('app-container').innerHTML = `
                    <div class="text-center space-y-6">
                        <h1 class="text-2xl font-black italic uppercase">Kirim ke <span class="text-pink-500">${name}</span></h1>
                        <textarea id="msg" placeholder="Tulis rahasia..." class="w-full h-52 p-7 bg-zinc-950 rounded-[40px] border-2 border-zinc-900 focus:border-pink-500 text-lg font-bold"></textarea>
                        <button onclick="sendMsg('${uid}')" class="w-full bg-white text-black p-6 rounded-full font-black text-xl shadow-xl">KIRIM ANONIM</button>
                    </div>
                `;
            });
        }

        function sendMsg(uid) {
            const txt = document.getElementById('msg').value;
            if(!txt) return alert("Isi dulu Boss!");
            db.ref('messages/' + uid).push({ text: txt, date: new Date().toLocaleString() });
            alert("TERKIRIM!");
            document.getElementById('msg').value = "";
        }

        function checkUser(user) {
            db.ref('users/' + user.uid).once('value', snap => {
                if (!snap.exists()) {
                    const handle = prompt("Masukan Username (Contoh: @rafa):");
                    db.ref('users/' + user.uid).set({ handle: handle, gmail: user.email });
                    location.reload();
                } else {
                    renderDashboard(user.uid, snap.val());
                }
            });
        }

        function renderDashboard(uid, data) {
            const link = window.location.origin + window.location.pathname + "?u=" + uid;
            document.getElementById('app-container').innerHTML = `
                <div class="glass p-8 text-center space-y-5">
                    <h2 class="text-3xl font-black italic text-pink-500">${data.handle}</h2>
                    <p class="text-[10px] text-zinc-500 break-all">${link}</p>
                    <button onclick="navigator.clipboard.writeText('${link}'); alert('Salin!')" class="w-full bg-white text-black py-4 rounded-full font-black text-xs">SALIN LINK</button>
                </div>
                <div id="msgs" class="mt-10 space-y-4"></div>
            `;
            db.ref('messages/' + uid).on('value', snap => {
                const box = document.getElementById('msgs'); box.innerHTML = "";
                snap.forEach(m => {
                    box.innerHTML += `<div class="bg-zinc-950 p-6 rounded-[30px] border border-zinc-900 font-bold italic">"${m.val().text}"</div>`;
                });
            });
        }
    </script>
</body>
</html>
