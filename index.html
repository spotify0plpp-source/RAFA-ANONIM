<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPX ANONIM - PRO SECURE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #000; color: #fff; }
        .ngl-gradient { background: linear-gradient(45deg, #FF0055, #FFCC00); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; }
        .blur-text { filter: blur(8px); user-select: none; opacity: 0.4; }
        .admin-card { border-left: 4px solid #EAB308; background: rgba(234, 179, 8, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <div id="app-container" class="w-full max-w-sm space-y-8 mt-10"></div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://rapx-ngl-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ADMIN_NAME = "RAPXADMIN";
        const ADMIN_PASS = "rafafauzankamil19";

        auth.onAuthStateChanged(user => {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('u');
            if (target) { renderSender(target); } 
            else if (user) { checkUserRegistration(user); } 
            else { renderLanding(); }
        });

        function renderLanding() {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-6">
                    <h1 class="text-6xl font-black italic ngl-gradient bg-clip-text text-transparent">RAPX.</h1>
                    <p class="text-zinc-500 text-xs tracking-widest uppercase">Secret Feedback System</p>
                    <button onclick="auth.signInWithPopup(provider)" class="w-full bg-white text-black p-5 rounded-full font-black flex items-center justify-center gap-3 shadow-2xl">
                        <img src="https://www.google.com/favicon.ico" class="w-5"> SIGN IN WITH GOOGLE
                    </button>
                    <div class="pt-10 flex flex-col gap-2 text-center">
                         <button onclick="loginAdmin()" class="text-[10px] text-zinc-800 hover:text-zinc-500 transition">ADMIN ACCESS</button>
                         <p class="text-[9px] text-zinc-900">Owner: @rapaa_71 (TikTok)</p>
                    </div>
                </div>
            `;
        }

        function checkUserRegistration(user) {
            db.ref('users/' + user.uid).once('value', snap => {
                if (!snap.exists()) {
                    document.getElementById('app-container').innerHTML = `
                        <div class="glass p-8 space-y-6 text-center">
                            <h2 class="text-xl font-bold italic">SETUP PROFILE</h2>
                            <div class="space-y-4">
                                <input type="text" id="soc-id" placeholder="@Username IG/TikTok" class="w-full p-4 bg-zinc-950 rounded-2xl border border-zinc-800 text-center font-bold">
                                <input type="password" id="u-pass" placeholder="Buat Password Akun" class="w-full p-4 bg-zinc-950 rounded-2xl border border-zinc-800 text-center text-sm">
                            </div>
                            <button onclick="saveProfile('${user.uid}', '${user.email}')" class="w-full ngl-gradient p-4 rounded-full font-black shadow-lg">AKTIFKAN LINK</button>
                        </div>
                    `;
                } else { renderDashboard(user.uid, snap.val()); }
            });
        }

        function saveProfile(uid, email) {
            const social = document.getElementById('soc-id').value;
            const pass = document.getElementById('u-pass').value;
            if (!social || !pass) return alert("Lengkapi data!");
            db.ref('users/' + uid).set({ gmail: email, handle: social, pw: pass, isVIP: false, joinDate: new Date().toLocaleDateString() }).then(() => location.reload());
        }

        function renderDashboard(uid, data) {
            const link = window.location.href.split('?')[0] + "?u=" + uid;
            document.getElementById('app-container').innerHTML = `
                <div class="glass p-8 text-center space-y-5">
                    <h2 class="text-2xl font-black italic text-pink-500">${data.handle}</h2>
                    <div class="p-3 bg-black/50 rounded-xl text-[9px] text-zinc-500 border border-zinc-900 break-all font-mono">${link}</div>
                    <button onclick="navigator.clipboard.writeText('${link}'); alert('Link Copied!')" class="w-full bg-white text-black py-4 rounded-full font-black text-xs uppercase tracking-tighter">SHARE TO STORY</button>
                </div>
                <div id="messages" class="space-y-4 mt-8">Memuat pesan...</div>
                <button onclick="window.location.href='https://wa.me/6285779155783?text=Beli%20VIP%20ID%3A%20${uid}'" class="w-full border border-yellow-600/50 text-yellow-500 p-4 rounded-full font-bold text-[10px] uppercase tracking-widest">💎 UPGRADE VIP</button>
            `;
            db.ref('messages/' + uid).on('value', snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                if(!snap.exists()) return box.innerHTML = "<p class='text-center text-zinc-800 text-xs'>Belum ada pesan.</p>";
                snap.forEach(m => {
                    const msg = m.val();
                    box.innerHTML += `<div class="bg-zinc-900/50 p-6 rounded-[25px] border border-zinc-800/50 shadow-xl">
                        <p class="text-lg font-bold italic leading-snug">"${msg.text}"</p>
                        <div class="mt-4 pt-3 border-t border-zinc-800 flex justify-between items-center">
                            <span class="text-[9px] font-black text-pink-500 uppercase italic">Sender:</span>
                            <span class="text-[10px] font-bold ${data.isVIP ? 'text-blue-400' : 'blur-text'}">${msg.sender}</span>
                        </div>
                    </div>`;
                });
            });
        }

        function renderSender(uid) {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-6">
                    <h1 class="text-2xl font-black italic tracking-tighter text-pink-500">KIRIM PESAN ANONIM</h1>
                    <textarea id="msg-input" placeholder="Tulis rahasia lu..." class="w-full h-44 p-6 bg-zinc-900 rounded-[35px] border border-zinc-800 outline-none text-lg"></textarea>
                    <input type="text" id="send-id" placeholder="Username IG/TT Lu (Anonim)" class="w-full p-4 bg-zinc-950 rounded-2xl border border-zinc-800 text-center text-xs">
                    <button onclick="pushMsg('${uid}')" class="w-full ngl-gradient p-5 rounded-full font-black text-lg shadow-xl hover:scale-105 transition">KIRIM SEKARANG</button>
                </div>
            `;
        }

        function pushMsg(uid) {
            const txt = document.getElementById('msg-input').value;
            const sender = document.getElementById('send-id').value || "Seseorang Misterius";
            if(!txt) return;
            db.ref('messages/' + uid).push({ text: txt, sender: sender, date: new Date().toLocaleString() });
            alert("Terkirim!");
            document.getElementById('msg-input').value = "";
        }

        function loginAdmin() {
            const user = prompt("ID ADMIN:");
            const pass = prompt("PASSWORD:");
            if (user === ADMIN_NAME && pass === ADMIN_PASS) { renderAdmin(); } 
            else { alert("AKSES DITOLAK!"); }
        }

        function renderAdmin() {
            document.getElementById('app-container').innerHTML = `
                <h1 class="text-3xl font-black text-yellow-500 italic text-center mb-8">BOSS PANEL</h1>
                <div id="admin-list" class="space-y-4"></div>
            `;
            db.ref('users').on('value', snap => {
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                snap.forEach(u => {
                    const d = u.val(); const uid = u.key;
                    list.innerHTML += `<div class="glass p-5 admin-card space-y-2">
                        <p class="font-black text-pink-500">@${d.handle} ${d.isVIP ? '💎' : ''}</p>
                        <p class="text-[10px] text-zinc-300">Mail: ${d.gmail}</p>
                        <p class="text-[10px] text-zinc-300">Pass: ${d.pw}</p>
                        <button onclick="db.ref('users/${uid}').update({isVIP:!${d.isVIP}})" class="w-full mt-2 bg-yellow-500 text-black py-2 rounded-lg font-black text-[9px]">TOGGLE VIP</button>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
