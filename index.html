<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPX - SUPREME V17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #a5f3fc 0%, #fbcfe8 100%); 
            min-height: 100vh; color: #1e293b; margin: 0;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 40px; 
        }
        .btn-main { 
            background: #ffffff; color: #be185d; font-weight: 900; 
            border-radius: 30px; padding: 18px; width: 100%; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(190, 24, 93, 0.1);
        }
        .badge-supreme { background: #be185d; color: #fff; font-size: 9px; font-weight: 900; padding: 5px 15px; border-radius: 12px; box-shadow: 0 0 20px rgba(190, 24, 93, 0.3); text-transform: uppercase; }
        .badge-vvip { background: #0ea5e9; color: #fff; font-size: 8px; font-weight: 900; padding: 4px 12px; border-radius: 10px; }
        .input-rap { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 20px; padding: 18px; width: 100%; outline: none; }
        .supreme-border { border: 3px solid #be185d; box-shadow: 0 0 30px rgba(190, 24, 93, 0.2); }
    </style>
</head>
<body class="flex flex-col items-center p-6">
    <div id="app-container" class="w-full max-w-sm pt-8"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrV-VoZ00xAAlNkEyfz3fB3O323jJuSXE",
            databaseURL: "https://rapx-ngl-default-rtdb.firebaseio.com",
            projectId: "rapx-ngl"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('rapx_user'));
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('u');

        if (target) { renderSender(target); } 
        else if (currentUser) { startApp(); } 
        else { renderLanding(); }

        function renderLanding() {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-8 py-10">
                    <h1 class="text-7xl font-black italic text-pink-600 tracking-tighter">RAPX.</h1>
                    <div class="glass p-8 space-y-4">
                        <input id="l_user" placeholder="Username" class="input-rap">
                        <input id="l_pass" type="password" placeholder="Password" class="input-rap">
                        <button onclick="login()" class="btn-main uppercase tracking-widest">Login</button>
                    </div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Cotton Candy • <span onclick="renderRegister()" class="text-pink-600 cursor-pointer underline">Daftar</span></p>
                </div>`;
        }

        function login() {
            const u = document.getElementById('l_user').value.trim();
            const p = document.getElementById('l_pass').value;

            // FIX LOGIN STUCK - DIRECT REDIRECT
            if (u === "rapx" && p === "rapx") {
                const devData = { user: "rapx", pass: "rapx", level: "DEV TINGKAT ATAS" };
                localStorage.setItem('rapx_user', JSON.stringify(devData));
                alert("WELCOME BACK, BOSS RAFA!");
                window.location.reload(); 
                return;
            }

            db.ref('users/' + u.toLowerCase()).once('value', snap => {
                if(snap.exists() && snap.val().pass === p) {
                    localStorage.setItem('rapx_user', JSON.stringify(snap.val()));
                    window.location.reload();
                } else { alert("Data Salah!"); }
            });
        }

        function register() {
            const u = document.getElementById('r_user').value.toLowerCase().trim();
            const p = document.getElementById('r_pass').value;
            if(!u || !p) return alert("Isi data!");
            db.ref('users/' + u).once('value', snap => {
                if(snap.exists()) return alert("Username ada!");
                const data = { user: u, pass: p, level: 'USER' };
                db.ref('users/' + u).set(data).then(() => {
                    localStorage.setItem('rapx_user', JSON.stringify(data));
                    window.location.reload();
                });
            });
        }

        function renderRegister() {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-8 py-10">
                    <h1 class="text-6xl font-black italic text-pink-600 tracking-tighter uppercase">Join.</h1>
                    <div class="glass p-8 space-y-4">
                        <input id="r_user" placeholder="Username" class="input-rap">
                        <input id="r_pass" type="password" placeholder="Password" class="input-rap">
                        <button onclick="register()" class="btn-main">BUAT AKUN</button>
                    </div>
                    <p onclick="location.reload()" class="text-xs text-slate-500 font-bold cursor-pointer uppercase">Kembali</p>
                </div>`;
        }

        function startApp() {
            db.ref('users/' + currentUser.user).on('value', snap => {
                renderDashboard(snap.val() || currentUser);
            });
        }

        function renderDashboard(data) {
            const link = window.location.origin + window.location.pathname + "?u=" + data.user;
            const isSupreme = (data.level === 'DEV TINGKAT ATAS');
            document.getElementById('app-container').innerHTML = `
                <div class="glass p-10 text-center space-y-6 relative ${isSupreme ? 'supreme-border' : ''}">
                    <div class="flex flex-col items-center gap-2">
                        <h2 class="text-4xl font-black italic text-slate-800">${data.user}</h2>
                        <span class="${isSupreme ? 'badge-supreme' : data.level === 'VVIP' ? 'badge-vvip' : 'text-[8px] font-bold text-slate-400 uppercase tracking-widest'}">${data.level}</span>
                    </div>
                    <button onclick="navigator.clipboard.writeText('${link}'); alert('Link Disalin!')" class="btn-main text-[10px] uppercase tracking-widest">Salin Link Bio</button>
                    ${isSupreme ? `<button onclick="renderAdmin()" class="w-full bg-pink-600 text-white py-4 rounded-3xl font-black text-[10px] shadow-lg uppercase">Admin Control</button>` : ''}
                    <button onclick="localStorage.clear(); location.reload()" class="mt-4 text-[8px] text-slate-400 uppercase">Logout</button>
                </div>
                <div id="msgs-box" class="mt-12 space-y-4 pb-20"></div>`;
            loadMessages(data);
        }

        function loadMessages(userData) {
            db.ref('messages/' + userData.user).on('value', snap => {
                const box = document.getElementById('msgs-box'); box.innerHTML = "";
                const canSee = (userData.level !== 'USER');
                snap.forEach(m => {
                    const msg = m.val();
                    box.innerHTML = `
                        <div class="glass p-6 rounded-[35px] border border-white/40 shadow-sm">
                            <p class="text-lg font-bold italic text-slate-800">"${msg.text}"</p>
                            <p class="mt-4 text-[10px] font-black text-pink-600 uppercase">${canSee ? 'DARI: '+msg.sender : 'HINT: '+ (msg.hint || 'Anonim')}</p>
                        </div>` + box.innerHTML;
                });
            });
        }

        function renderSender(uid) {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-6 pt-10">
                    <h1 class="text-5xl font-black italic text-pink-600 uppercase tracking-tighter">${uid}</h1>
                    <textarea id="m_txt" placeholder="Tulis rahasia..." class="w-full h-64 glass border-2 border-white/50 p-8 text-lg font-bold outline-none text-slate-800 placeholder-slate-400"></textarea>
                    <button onclick="sendMsg('${uid}')" class="btn-main shadow-2xl">KIRIM ANONIM</button>
                </div>`;
        }

        function sendMsg(uid) {
            const txt = document.getElementById('m_txt').value;
            if(!txt) return alert("Isi pesan dulu!");
            db.ref('messages/' + uid).push({ 
                text: txt, 
                sender: (currentUser ? currentUser.user : "Anonim"), 
                hint: navigator.platform 
            });
            alert("Terkirim!"); document.getElementById('m_txt').value = "";
        }
        
        function renderAdmin() {
            document.getElementById('app-container').innerHTML = `<div class="glass p-8"><h1 class="text-xl font-black mb-8 text-slate-800 uppercase italic">Supreme Control</h1><div id="u_list" class="space-y-4"></div><button onclick="location.reload()" class="mt-10 text-xs text-slate-400 underline uppercase font-bold">Back to Dashboard</button></div>`;
            db.ref('users').once('value', snap => {
                const box = document.getElementById('u_list');
                snap.forEach(u => {
                    box.innerHTML += `<div class="flex justify-between items-center border-b pb-4">
                        <div><p class="font-bold text-slate-700 text-sm">${u.key}</p><p class="text-[8px] text-slate-400 uppercase">${u.val().level}</p></div>
                        <button onclick="db.ref('users/${u.key}').update({level:'VVIP'}); alert('Upgraded!'); renderAdmin()" class="bg-blue-500 text-white font-black text-[7px] px-2 py-1 rounded">VVIP</button>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
