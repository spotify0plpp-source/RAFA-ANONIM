<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPX - MAINTENANCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* FULL HITAM */
            color: #ffffff; /* TULISAN PUTIH */
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin: 0;
            animation: pulse 2s infinite ease-in-out;
        }

        p {
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 10px;
        }

        /* EFEK BERDENYUT BIAR GAK KAKU */
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WEB SEDANG MAINTENANCE</h1>
        <p>Project: RAPX - ALYAAA Edition</p>
    </div>

</body>
</html>
